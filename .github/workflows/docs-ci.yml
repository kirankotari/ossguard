name: Docs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !LICENSE

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,303,403,429
            --timeout 60
            --retry-wait-time 10
            --max-retries 5
            --exclude '^mailto:'
            --exclude 'github\.com/.*/settings'
            --exclude 'contributor-covenant\.org'
            --exclude 'bestpractices\.dev'
            --exclude 'scorecard\.dev'
            '**/*.md'
          fail: false
